<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c2bee",
                        "sky-accent": "#0ea5e9",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .shimmer-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(45deg, #8c2bee, #a855f7);
            transition: all 0.3s ease;
        }
        
        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .blob-purple {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(140, 43, 238, 0.3) 0%, rgba(140, 43, 238, 0) 70%);
            filter: blur(100px);
            top: -100px;
            left: -100px;
        }

        .blob-sky {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.25) 0%, rgba(14, 165, 233, 0) 70%);
            filter: blur(120px);
            bottom: -150px;
            right: -100px;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 flex items-center justify-center min-h-screen overflow-hidden">
<!-- Background Immersive Elements -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="blob-purple"></div>
<div class="blob-sky"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="glass-card rounded-xl p-8 md:p-10 shadow-2xl flex flex-col gap-8">
<!-- Logo/Header Area -->
<div class="flex flex-col items-center text-center gap-2">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl text-white">map</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white">Mapa do Engajamento</h1>
<p class="text-slate-400 font-medium">Bem-vindo de volta. Entre para continuar.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-300 ml-1">E-mail</label>
<div class="relative">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-white placeholder:text-slate-500" placeholder="seu@email.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-300">Senha</label>
<a class="text-xs text-primary hover:text-primary/80 font-medium transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-white placeholder:text-slate-500" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-500 hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="shimmer-btn w-full py-4 rounded-xl font-bold text-white shadow-xl shadow-primary/10 hover:shadow-primary/30 transform hover:-translate-y-0.5 transition-all mt-2" type="submit">
                    ENTRAR NA PLATAFORMA
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Ou acesse com</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-3">
<button class="w-full bg-white text-black font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-colors shadow-lg">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="w-full bg-white text-black font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-colors shadow-lg">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.403-2.427 1.247-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.558-1.702z"></path>
</svg>
                    Apple ID
                </button>
</div>
<!-- Footer Link -->
<p class="text-center text-slate-500 text-sm font-medium">
                Não possui conta? 
                <a class="text-primary hover:text-primary/80 font-bold transition-colors" href="#">Criar agora</a>
</p>
</div>
<!-- Support Info -->
<div class="mt-8 flex justify-center gap-6 text-slate-600 text-xs font-semibold uppercase tracking-widest">
<a class="hover:text-slate-400 transition-colors" href="#">Suporte</a>
<a class="hover:text-slate-400 transition-colors" href="#">Privacidade</a>
<a class="hover:text-slate-400 transition-colors" href="#">Termos</a>
</div>
</main>
</body></html>
